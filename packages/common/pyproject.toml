[project]
name = "vn-news-common"
version = "0.1.0"
description = "Shared schemas, db models, and utilities for vn-news-summarizer."
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0.36",
    "alembic>=1.14",
    "aiosqlite>=0.20",
    "asyncpg>=0.30",
    "python-dateutil>=2.9",
    "pyyaml>=6.0",
    "loguru>=0.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vn_news_common"]
