[project]
name = "vn-news-inference"
version = "0.1.0"
description = "Model inference service with LLM fallback."
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
dependencies = [
    "vn-news-common",
    "transformers>=4.46",
    "torch>=2.4",
    "sentencepiece>=0.2",
    "google-cloud-aiplatform>=1.74",  # for fallback path
    "tenacity>=9.0",
]

[tool.uv.sources]
vn-news-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vn_news_inference"]
