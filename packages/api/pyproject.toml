[project]
name = "vn-news-api"
version = "0.1.0"
description = "FastAPI backend for vn-news-summarizer."
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
dependencies = [
    "vn-news-common",
    "vn-news-inference",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "redis>=5.2",
    "python-multipart>=0.0.20",
]

[tool.uv.sources]
vn-news-common    = { workspace = true }
vn-news-inference = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vn_news_api"]
