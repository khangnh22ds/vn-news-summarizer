[project]
name = "vn-news-labeling"
version = "0.1.0"
description = "LLM-assisted summarization labeling pipeline (Vertex AI Gemini)."
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
dependencies = [
    "vn-news-common",
    "google-cloud-aiplatform>=1.74",
    "tenacity>=9.0",
    "pyvi>=0.1.1",
    "underthesea>=6.8",
    "rapidfuzz>=3.10",
    "tqdm>=4.66",
    # NLI factuality model is loaded via transformers in the training package;
    # labeling re-uses that wrapper.
]

[tool.uv.sources]
vn-news-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vn_news_labeling"]
