[project]
name = "vn-news-training"
version = "0.1.0"
description = "Baselines, training, and evaluation for Vietnamese summarization."
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
dependencies = [
    "vn-news-common",
    "transformers>=4.46",
    "datasets>=3.1",
    "accelerate>=1.1",
    "peft>=0.13",
    "evaluate>=0.4",
    "rouge-score>=0.1.2",
    "bert-score>=0.3.13",
    "torch>=2.4",
    "sentencepiece>=0.2",
    "mlflow>=2.17",
    "pandas>=2.2",
    "numpy>=2.0",
    "scikit-learn>=1.5",
    "sumy>=0.11",
    "pyvi>=0.1.1",
]

[tool.uv.sources]
vn-news-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/vn_news_training"]
