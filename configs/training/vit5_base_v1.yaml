# Fine-tune ViT5-base for Vietnamese news summarization.
# Designed to fit on a single Colab/Kaggle T4 (16 GB) with LoRA.
#
# Dataset format: the JSONL files written by
# ``packages/labeling.dataset.build_dataset_version`` (TICKET-003), so
# ``content_text`` is the source article and ``summary`` is the LLM-
# generated reference label.
version: "1.0.0"
run_name: vit5-base-news-v1

dataset:
  name: v1
  root: data/datasets
  text_column: content_text
  target_column: summary

model:
  base: VietAI/vit5-base
  max_input_length: 1024
  max_target_length: 128

training:
  output_dir: models/vit5-news-v1
  num_train_epochs: 4
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  warmup_ratio: 0.05
  weight_decay: 0.01
  fp16: true                    # T4 = fp16. Set bf16 instead on A100/H100.
  bf16: false
  eval_strategy: epoch          # transformers >= 4.41 renamed evaluation_strategy
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: rougeL
  greater_is_better: true
  predict_with_generate: true
  generation_num_beams: 4
  generation_max_length: 128
  logging_steps: 50
  save_total_limit: 2
  seed: 42
  report_to: ["mlflow"]         # MLflow tracking (local file backend by default).

peft:
  enabled: true
  type: lora
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: [q, v]        # T5 attention projections.

evaluation:
  metrics: [rouge1, rouge2, rougeL, bertscore_f1]
  bertscore_model: xlm-roberta-base

mlflow:
  experiment_name: vn-news-summarization
  tracking_uri: file:./mlruns
