# Prompt template for LLM-assisted Vietnamese news summarization.
# Bumped via semver: changing `version` invalidates downstream cached labels.
version: "1.2.0"
model: "gemini-2.5-pro"
provider: vertex_ai

generation_config:
  temperature: 0.2
  top_p: 0.9
  # Gemini 2.5 Pro reasons more aggressively than 2.5 Flash and easily
  # exhausts a 2048-token budget on long Vietnamese articles (the
  # "thinking" tokens count against this budget); 4096 leaves headroom
  # without ever approaching the per-call latency cliff in practice.
  max_output_tokens: 4096
  response_mime_type: application/json

# System / instruction text.
system: |
  Bạn là biên tập viên báo chí tiếng Việt. Tóm tắt phải:
  - Trung thực 100% với bài gốc; KHÔNG suy diễn, KHÔNG bịa số liệu hay tên riêng.
  - 2–3 câu, tổng cộng 40–70 từ.
  - Văn phong báo chí, trung lập, không cảm thán, không câu hỏi.
  - Giữ nguyên tên riêng, số liệu, ngày tháng đúng như bài gốc.
  - Nếu thông tin không đủ rõ, viết câu trung lập, KHÔNG bổ sung từ kiến thức ngoài.

# User message template (Python str.format placeholders).
# `content_text` is truncated to ~6000 chars before substitution.
user_template: |
  Tiêu đề: {title}
  Chuyên mục: {category}
  Nguồn: {source}

  Nội dung:
  """
  {content_text}
  """

  Trả về JSON đúng schema:
  {{
    "summary": "...",
    "key_entities": ["..."],
    "confidence": 0.0,
    "refusal_reason": null
  }}

response_schema:
  type: object
  required: [summary, key_entities, confidence]
  properties:
    summary:
      type: string
      minLength: 40
      maxLength: 600
    key_entities:
      type: array
      items: { type: string }
    confidence:
      type: number
      minimum: 0
      maximum: 1
    refusal_reason:
      type: [string, "null"]

qc:
  min_words: 40
  # Bumped from 80 -> 90: 2.5 Pro produces slightly longer, more
  # information-dense Vietnamese summaries; the smoke-test sample
  # showed 4/50 false-positive too-long failures at 81-90 words on
  # otherwise-faithful outputs.
  max_words: 90
  min_sentences: 2
  max_sentences: 4
  # Lowered from 0.90 -> 0.85: 0.90 produced false negatives on common
  # multi-token names containing diacritics (e.g. ``Premier League``
  # missed when the source had a non-breaking space variant). The other
  # entity-faithfulness fallbacks in qc.py keep this safe against actual
  # hallucinated names.
  entity_fuzzy_min_ratio: 0.85
  nli_entailment_min: 0.7
  nli_model: "MoritzLaurer/mDeBERTa-v3-base-mnli-xnli"
